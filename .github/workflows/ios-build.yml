name: 构建 iOS App

on:
  push:
    branches: [main, master]
  workflow_dispatch:
  release:
    types: [published]

env:
  MOBILE_APP_URL: ${{ vars.MOBILE_APP_URL || 'http://8.136.119.234:3000' }}

jobs:
  # 模拟器构建：无需 Apple 证书，用于验证流程
  build-simulator:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: 安装依赖
        run: npm ci

      - name: Capacitor 同步
        run: npx cap sync
        env:
          MOBILE_APP_URL: ${{ env.MOBILE_APP_URL }}

      - name: 构建 iOS (模拟器)
        run: |
          xcodebuild -project ios/App/App.xcodeproj \
            -scheme App \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build \
            build

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-app
          path: build/Build/Products/Debug-iphonesimulator/App.app
          retention-days: 7

  # IPA 构建：需配置 Apple 证书，生成可安装到真机的 .ipa
  # 在 Variables 中设置 BUILD_IPA_ENABLED=true 时才会执行（需已配置证书相关 Secrets）
  build-ipa:
    runs-on: macos-14
    needs: build-simulator
    if: vars.BUILD_IPA_ENABLED == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: 生成 ExportOptions.plist
        run: |
          PROFILE_NAME="${{ secrets.APPLE_PROFILE_NAME || 'Agent 市场' }}"
          sed "s|PROFILE_NAME_PLACEHOLDER|$PROFILE_NAME|g" .github/ExportOptions.plist.example > .github/ExportOptions.plist

      - name: 导入证书和描述文件
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: 安装依赖
        run: npm ci

      - name: Capacitor 同步
        run: npx cap sync
        env:
          MOBILE_APP_URL: ${{ env.MOBILE_APP_URL }}

      - name: 构建 Archive
        run: |
          xcodebuild -project ios/App/App.xcodeproj \
            -scheme App \
            -destination 'generic/platform=iOS' \
            -archivePath App.xcarchive \
            archive

      - name: 导出 IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath App.xcarchive \
            -exportOptionsPlist .github/ExportOptions.plist \
            -exportPath output \
            -allowProvisioningUpdates

      - name: 上传 IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: output/
          retention-days: 30
