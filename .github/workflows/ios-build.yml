name: 构建 iOS App

on:
  push:
    branches: [main, master]
  workflow_dispatch:
  release:
    types: [published]

env:
  MOBILE_APP_URL: ${{ vars.MOBILE_APP_URL || 'http://8.136.119.234:3000' }}

jobs:
  # 模拟器构建：无需 Apple 证书，用于验证流程
  build-simulator:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: 选择 Xcode 16
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: 安装依赖
        run: npm ci

      - name: Capacitor 同步
        run: npx cap sync
        env:
          MOBILE_APP_URL: ${{ env.MOBILE_APP_URL }}

      - name: 构建 iOS (模拟器)
        run: |
          xcodebuild -project ios/App/App.xcodeproj \
            -scheme App \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-app
          path: build/Build/Products/Debug-iphonesimulator/App.app
          retention-days: 7

  # IPA 构建：需配置 Apple 证书，生成可安装到真机的 .ipa
  # 在 Variables 中设置 BUILD_IPA_ENABLED=true 时才会执行（需已配置证书相关 Secrets）
  build-ipa:
    runs-on: macos-14
    needs: build-simulator
    if: vars.BUILD_IPA_ENABLED == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: 选择 Xcode 16
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: 导入证书和描述文件
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          if [ -z "$BUILD_CERTIFICATE_BASE64" ]; then
            echo "::error::BUILD_CERTIFICATE_BASE64 secret is not set"
            exit 1
          fi
          if [ -z "$P12_PASSWORD" ]; then
            echo "::error::P12_PASSWORD secret is not set"
            exit 1
          fi
          if [ -z "$BUILD_PROVISION_PROFILE_BASE64" ]; then
            echo "::error::BUILD_PROVISION_PROFILE_BASE64 secret is not set"
            exit 1
          fi

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode > $CERTIFICATE_PATH
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode > $PP_PATH

          if [ ! -s "$CERTIFICATE_PATH" ]; then
            echo "::error::Decoded certificate file is empty - check BUILD_CERTIFICATE_BASE64"
            exit 1
          fi

          PP_UUID=$(security cms -D -i "$PP_PATH" | plutil -extract UUID raw -)
          if [ -z "$PP_UUID" ]; then
            echo "::error::Could not extract UUID from provisioning profile"
            exit 1
          fi
          echo "PP_UUID=$PP_UUID" >> $GITHUB_ENV

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -f pkcs12 -k $KEYCHAIN_PATH -T /usr/bin/codesign -T /usr/bin/productbuild
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$PP_UUID.mobileprovision"

      - name: 生成 ExportOptions.plist
        run: |
          sed "s|PROFILE_NAME_PLACEHOLDER|${{ env.PP_UUID }}|g" .github/ExportOptions.plist.example > .github/ExportOptions.plist

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: 安装依赖
        run: npm ci

      - name: Capacitor 同步
        run: npx cap sync
        env:
          MOBILE_APP_URL: ${{ env.MOBILE_APP_URL }}

      - name: 构建 Archive
        run: |
          xcodebuild -project ios/App/App.xcodeproj \
            -scheme App \
            -destination 'generic/platform=iOS' \
            -archivePath App.xcarchive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="${{ env.PP_UUID }}" \
            archive

      - name: 导出 IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath App.xcarchive \
            -exportOptionsPlist .github/ExportOptions.plist \
            -exportPath output \
            -allowProvisioningUpdates

      - name: 上传 IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: output/
          retention-days: 30
