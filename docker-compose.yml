services:
  mysql:
    # 使用国内镜像，避免 Docker Hub 拉取超时（海外可改回 mysql:8.0）
    image: docker.m.daocloud.io/library/mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-your_root_password}
      MYSQL_DATABASE: agent_marketplace
      MYSQL_CHARSET: utf8mb4
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: root:${MYSQL_ROOT_PASSWORD:-your_root_password}@tcp(mysql:3306)/agent_marketplace?charset=utf8mb4&parseTime=True
      SESSION_SECRET: ${SESSION_SECRET:-change-me-in-production}
      SESSION_COOKIE: ${SESSION_COOKIE:-agent_fiverr_session}
      # 部署后必填，与 NEXTAUTH_URL 保持一致（含端口），如 http://8.136.119.234:3000
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # 默认按阿里云百炼部署；若用 OpenAI 官方请在 .env 覆盖 MODEL 与 BASE_URL
      OPENAI_MODEL: ${OPENAI_MODEL:-qwen-plus}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      # 通义千问 DashScope 联网搜索（true/1 启用）
      LLM_ENABLE_WEB_SEARCH: ${LLM_ENABLE_WEB_SEARCH:-}
      # 语音条：auto + 模型名含 qwen 或 BASE_URL 含 dashscope → 百炼 Qwen-TTS（与 OPENAI_API_KEY 共用）
      TTS_PROVIDER: ${TTS_PROVIDER:-}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      DASHSCOPE_TTS_URL: ${DASHSCOPE_TTS_URL:-}
      DASHSCOPE_TTS_MODEL: ${DASHSCOPE_TTS_MODEL:-}
      DASHSCOPE_TTS_VOICE: ${DASHSCOPE_TTS_VOICE:-}
      DASHSCOPE_TTS_LANGUAGE: ${DASHSCOPE_TTS_LANGUAGE:-}
      DASHSCOPE_VC_MODEL: ${DASHSCOPE_VC_MODEL:-}
      DASHSCOPE_VOICE_ENROLL_URL: ${DASHSCOPE_VOICE_ENROLL_URL:-}
      OPENAI_TTS_API_KEY: ${OPENAI_TTS_API_KEY:-}
      # 临时排障：true 时聊天 JSON 含 ttsDebug（勿长期开启）
      TTS_DEBUG: ${TTS_DEBUG:-}
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # 构建时传入，用于 next.config.js rewrites
        API_BACKEND_URL: http://backend:8080
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      API_BACKEND_URL: http://backend:8080
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
    depends_on:
      - backend

volumes:
  mysql_data:
